services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:8000/api/github/callback}
      GITHUB_FRONTEND_REDIRECT_URL: ${GITHUB_FRONTEND_REDIRECT_URL:-http://localhost/profile/credentials}
      GITHUB_TOKEN_ENCRYPTION_SECRET: ${GITHUB_TOKEN_ENCRYPTION_SECRET:-change-me-github}
    ports:
      - "8000:8000"

  celery:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:8000/api/github/callback}
      GITHUB_FRONTEND_REDIRECT_URL: ${GITHUB_FRONTEND_REDIRECT_URL:-http://localhost/profile/credentials}
      GITHUB_TOKEN_ENCRYPTION_SECRET: ${GITHUB_TOKEN_ENCRYPTION_SECRET:-change-me-github}
    command: >
      celery -A src.celery.app.celery_app worker --beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  redis_data:
