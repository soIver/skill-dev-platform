base_url: "https://openrouter.ai/api/v1"

models:

  embedding:
    name: "nvidia/llama-nemotron-embed-vl-1b-v2:free"
    dimensions: 384

  llm:
    name: "openai/gpt-oss-20b:free"
    temperature: 0.1

limits:
  max_repository_payload_tokens: 100000

ignore_patterns:
  - "*.md"
  - "*.txt"
  - "package.json"
  - "package-lock.json"
  - "poetry.lock"
  - "Pipfile*"
  - "node_modules"
  - ".env*"
  - "__pycache__"
  - "venv"
  - ".venv"
  - "dist"
  - "build"
  - "out"

prompts:
  role: >
    You are an expert IT recruiter and software engineer. Analyze the following repository codebase 
    to identify the precise technical skills, languages, frameworks, and tools actively used by the contributor.

  vacancy_role: >
    You are an expert IT recruiter and software engineer. Analyze the following vacancy description
    to identify the core technical skills, languages, frameworks, platforms, and tools required from a candidate.

  base_task: >
    Output only a plain list of a maximum of 5 core skills that are most prominent and demonstrated 
    at the highest level in the code. Ignore dependencies and environments that are merely installed 
    but not actively used or configured.

  vacancy_task: >
    Output a list of 1 to 5 core skills that are most important for this vacancy. Ignore generic soft skills,
    company benefits, business-domain-only phrases, and minor nice-to-have tools unless they are clearly central.
    Assign a strict required proficiency score for each skill based on the seniority and responsibilities in the
    vacancy text.

  task_with_skills: >
    Evaluate the repository ONLY for the following skills: {skills}. 
    Do not include any other skills in the output. For each of these skills, determine 
    if they are demonstrably used in the code and provide a score.

  task_context: >
    Context: This analysis is for a specific task described as follows: "{description}". 
    Use this context to better understand the purpose of the code and the relevance of the skills found.

  task_requirements: |
    The task has the following numbered requirements:
    {requirements}

    If the repository does not solve the requested task, solves a different problem, does not contain meaningful code,
    does not use the requested technologies, or violates any listed requirement, treat the task as not completed.
    For a not completed task, output an empty "skills" array and put the ids of all unmet listed requirements
    into "failed_requirement_ids". If the task is completed and every requirement is met, use an empty
    "failed_requirement_ids" array.

  scoring: |
    For each skill, provide an estimated proficiency score from 0 to 100, where:
      0 = complete novice, never used before
      50 = intermediate, basic working knowledge
      70 = proficient, regular independent use
      85 = advanced, deep understanding, best practices
      100 = expert, complete command, can teach others, authoritative knowledge
    
    Be strict and conservative in your scoring. Most junior-level work should score between 40 and 65.

  format: |
    Output ONLY valid JSON in the following format:
    
    {
      "skills": [
        {"name": "SkillName", "score": 55}
      ],
      "failed_requirement_ids": [1, 2]
    }
    
    If no skills found or repository is empty, output:
    {"skills": [], "failed_requirement_ids": []}

  vacancy_format: |
    Output ONLY valid JSON in the following format:

    {
      "skills": [
        {"name": "SkillName", "score": 70}
      ]
    }

    If no technical skills are found, output:
    {"skills": []}
